name: CI/CD (devo)

on:
  push:
    branches: [devo]
    paths:
      - "bend/**"
      - "fend/**"
      - ".github/workflows/**"
      - "docker-compose*.yml"
  pull_request:
    branches: [devo]
    paths:
      - "bend/**"
      - "fend/**"
      - ".github/workflows/**"
      - "docker-compose*.yml"
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "bend/**"
            frontend:
              - "fend/**"

  sast-codeql:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    env:
      GOOGLE_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bend/requirements-dev.txt


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bend/requirements-dev.txt

      - name: Run tests
        run: pytest -q bend/tests

  
  dep-audit-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r bend/requirements.txt --strict

  test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"
    
      - name: Cache Bun
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('fend/bun.lock', 'fend/bun.lockb', 'fend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        working-directory: ./fend
        run: bun install --frozen-lockfile

      - name: Build frontend (smoke test)
        working-directory: ./fend
        run: bun run build

  
  dep-audit-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit JS dependencies
        working-directory: ./fend
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high


  build-push-backend:
    runs-on: ubuntu-latest
    needs: [changes, test-backend, dep-audit-backend]
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./bend
          file: ./bend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-${{ github.sha }}

  build-push-frontend:
    runs-on: ubuntu-latest
    needs: [changes, test-frontend, dep-audit-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./fend
          file: ./fend/Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_API_BASE_URL=http://nihikernel.local
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-${{ github.sha }}

  scan-backend:
    runs-on: ubuntu-latest
    needs: [changes, build-push-backend]
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore-backend
          exit-code: "1"

  scan-frontend:
    runs-on: ubuntu-latest
    needs: [changes, build-push-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore-frontend
          exit-code: "1"

  # ...existing code...
  # ...existing code...

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [changes, scan-backend]
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    env:
      NS: nihikernel-dev
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy backend (immutable SHA)
        run: |
          kubectl -n "$NS" set image deployment/backend \
            backend=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-${{ github.sha }}
          kubectl -n "$NS" rollout status deployment/backend --timeout=180s

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [changes, scan-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'
    env:
      NS: nihikernel-dev
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy frontend (immutable SHA)
        run: |
          kubectl -n "$NS" set image deployment/frontend \
            frontend=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-${{ github.sha }}
          kubectl -n "$NS" rollout status deployment/frontend --timeout=180s

