name: CI/CD (devo)

on:
  push:
    branches: [devo]
    paths:
      - "bend/**"
      - "fend/**"
      - ".github/workflows/**"
      - "docker-compose*.yml"
  pull_request:
    branches: [devo]
    paths:
      - "bend/**"
      - "fend/**"
      - ".github/workflows/**"
      - "docker-compose*.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "bend/**"
            frontend:
              - "fend/**"

  test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    env:
      GOOGLE_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bend/requirements-dev.txt

      - name: Run tests
        run: pytest -q bend/tests

  test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install deps
        working-directory: ./fend
        run: bun install --frozen-lockfile

      - name: Build frontend (smoke test)
        working-directory: ./fend
        run: bun run build

  build-push-backend:
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./bend
          file: ./bend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-${{ github.sha }}

  build-push-frontend:
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./fend
          file: ./fend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-${{ github.sha }}