name: CI/CD (devo)

on:
  push:
    branches: [devo]
  pull_request:
    branches: [devo]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bend/requirements-dev.txt

      - name: Run tests
        run: pytest -q bend/tests

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./bend
          file: ./bend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-backend:devo-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./fend
          file: ./fend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nihikernel-frontend:devo-${{ github.sha }}