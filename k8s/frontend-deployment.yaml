apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/akashdocker303/nihikernel-frontend:devo-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          