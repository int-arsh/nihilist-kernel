apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nihikernel-ingress
  namespace: nihikernel-dev
spec:
  ingressClassName: nginx
  rules:
    - host: nihikernel.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
